name: Analytics PR Documentation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.sql"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to document"
        required: true
        type: number

jobs:
  generate-docs:
    name: Generate PR Documentation
    runs-on: ubuntu-latest
    environment: CLAUDE_CREDENTIALS
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Set up engine + Claude auth
        uses: BindiyaKansekar/intelligent-doc-engine/.github/actions/setup-doc-engine@master
        with:
          engine_repo: BindiyaKansekar/intelligent-doc-engine
          engine_ref: master
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_credentials: ${{ secrets.CLAUDE_CREDENTIALS }}

      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ github.event.inputs.pr_number }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate analytics documentation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          analytics-doc scan-pr \
            --provider github \
            --repo "${{ github.repository }}" \
            --pr "${{ steps.pr.outputs.number }}" \
            --type snowflake \
            --output "pr-${{ steps.pr.outputs.number }}-docs.md" \
            --also-html "pr-${{ steps.pr.outputs.number }}-docs.html"

      - name: Publish HTML to GitHub Pages
        id: pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone gh-pages branch
          git clone --branch gh-pages --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" \
            _gh_pages

          cp "pr-${PR}-docs.html" "_gh_pages/pr-${PR}-docs.html"
          cd _gh_pages
          git add "pr-${PR}-docs.html"
          git commit -m "docs: PR #${PR} analytics report [skip ci]" || echo "No changes"
          git push origin gh-pages

          PAGES_URL="https://${OWNER}.github.io/${REPO_NAME}/pr-${PR}-docs.html"
          echo "url=${PAGES_URL}" >> $GITHUB_OUTPUT
          echo "Published: ${PAGES_URL}"

      - name: Post documentation as PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAGES_URL: ${{ steps.pages.outputs.url }}
        run: |
          PR="${{ steps.pr.outputs.number }}"
          # Append live Pages link before posting
          echo "" >> "pr-${PR}-docs.md"
          echo "---" >> "pr-${PR}-docs.md"
          echo "> 📊 **[View Interactive Lineage Report](${PAGES_URL})** — Opens directly in browser with interactive data lineage diagram" >> "pr-${PR}-docs.md"

          gh pr comment "$PR" \
            --repo "${{ github.repository }}" \
            --body-file "pr-${PR}-docs.md"
