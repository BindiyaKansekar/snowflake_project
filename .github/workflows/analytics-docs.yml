name: Analytics PR Documentation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.sql"
  workflow_dispatch:
    inputs:
      scope:
        description: "Documentation scope"
        required: true
        type: choice
        options:
          - "PR changes only"
          - "Full repository"
        default: "PR changes only"
      pr_number:
        description: "PR number (required for 'PR changes only')"
        required: false
        type: string

jobs:
  generate-docs:
    name: Generate PR Documentation
    runs-on: ubuntu-latest
    environment: CLAUDE_CREDENTIALS
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Set up engine + Claude auth
        uses: BindiyaKansekar/intelligent-doc-engine/.github/actions/setup-doc-engine@master
        with:
          engine_repo: BindiyaKansekar/intelligent-doc-engine
          engine_ref: master
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_credentials: ${{ secrets.CLAUDE_CREDENTIALS }}

      - name: Checkout repository (full repo scan only)
        if: github.event.inputs.scope == 'Full repository'
        uses: actions/checkout@v4

      - name: Generate analytics documentation
        id: gen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SCOPE="${{ github.event.inputs.scope }}"
          PR_OUT=""

          if [ "$SCOPE" = "Full repository" ]; then
            OUT_BASE="repo-docs"
            analytics-doc scan-dir \
              --path . \
              --type snowflake \
              --output "${OUT_BASE}.md" \
              --also-html "${OUT_BASE}.html" \
              --also-docx "${OUT_BASE}.docx" \
              --title "Full Repository — Snowflake SQL"
          else
            PR="${{ github.event.inputs.pr_number || github.event.pull_request.number }}"
            OUT_BASE="pr-${PR}-docs"
            analytics-doc scan-pr \
              --provider github \
              --repo "${{ github.repository }}" \
              --pr "${PR}" \
              --type snowflake \
              --output "${OUT_BASE}.md" \
              --also-html "${OUT_BASE}.html" \
              --also-docx "${OUT_BASE}.docx"
            PR_OUT="${PR}"
          fi

          echo "out_base=${OUT_BASE}" >> $GITHUB_OUTPUT
          echo "pr=${PR_OUT}" >> $GITHUB_OUTPUT

      - name: Upload docs artifact
        id: upload
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analytics-docs-${{ steps.gen.outputs.out_base }}
          path: "${{ steps.gen.outputs.out_base }}.*"
          retention-days: 30

      - name: Publish HTML to GitHub Pages
        id: pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUT_BASE: ${{ steps.gen.outputs.out_base }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if ! git clone --branch gh-pages --depth 1 \
              "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" \
              _gh_pages 2>/dev/null; then
            mkdir _gh_pages && cd _gh_pages
            git init
            git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
            git checkout --orphan gh-pages
            echo "<html><body><h1>Analytics Documentation</h1></body></html>" > index.html
            git add index.html
            git commit -m "init: create gh-pages branch [skip ci]"
            git push origin gh-pages
            cd ..
          fi

          cp "${OUT_BASE}.html" "_gh_pages/${OUT_BASE}.html"
          cd _gh_pages
          git add -f "${OUT_BASE}.html"
          git commit -m "docs: ${OUT_BASE} analytics report [skip ci]" || echo "No changes"
          git push origin gh-pages

          PAGES_URL="https://${OWNER}.github.io/${REPO_NAME}/${OUT_BASE}.html"
          echo "url=${PAGES_URL}" >> $GITHUB_OUTPUT

      - name: Post link as PR comment
        if: github.event.inputs.scope != 'Full repository'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAGES_URL: ${{ steps.pages.outputs.url }}
          PR: ${{ steps.gen.outputs.pr }}
        run: |
          gh pr comment "${PR}" \
            --repo "${{ github.repository }}" \
            --body "> 📊 **[View Interactive Lineage Report](${PAGES_URL})** — Opens directly in browser"

      - name: Write job summary
        if: always()
        env:
          PAGES_URL: ${{ steps.pages.outputs.url }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          SCOPE: ${{ github.event.inputs.scope }}
        run: |
          SCOPE_LABEL="${SCOPE:-PR changes only}"
          echo "## 📊 Analytics Documentation — ${SCOPE_LABEL}" >> $GITHUB_STEP_SUMMARY
          [ -n "${PAGES_URL}" ] && echo "- **[View Interactive Lineage Report](${PAGES_URL})**" >> $GITHUB_STEP_SUMMARY || true
          [ -n "${ARTIFACT_URL}" ] && echo "- **[Download All Docs](${ARTIFACT_URL})** (.md · .html · .docx)" >> $GITHUB_STEP_SUMMARY || true
